<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Two State Brief</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #E8F0E4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #__bundler_loading {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
      color: #666;
      background: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      z-index: 10000;
    }

    #__bundler_thumbnail {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E8F0E4;
      z-index: 9999;
    }

    #__bundler_thumbnail svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #__bundler_placeholder {
      color: #999;
      font-size: 14px;
    }
  </style>

      #__bundler_loading {

  <script>

    document.addEventListener('DOMContentLoaded', async function () {
      const loading = document.getElementById('__bundler_loading');
      function setStatus(msg) { if (loading) loading.textContent = msg; }

      // Error sink persists across replaceWith since it's on window, not the DOM.
      window.addEventListener('error', function (e) {
        var p = document.body || document.documentElement;
        var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
        d.id = '__bundler_err';
        d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
        d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
          '[bundle] ' + (e.message || e.type) +
          (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
      }, true);

      try {
        const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
        const templateEl = document.querySelector('script[type="__bundler/template"]');
        if (!manifestEl || !templateEl) {
          setStatus('Error: missing bundle data');
          console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
          return;
        }

        const manifest = JSON.parse(manifestEl.textContent);
        let template = JSON.parse(templateEl.textContent);

        const uuids = Object.keys(manifest);
        setStatus('Unpacking ' + uuids.length + ' assets...');

        const blobUrls = {};
        await Promise.all(uuids.map(async (uuid) => {
          const entry = manifest[uuid];
          try {
            const binaryStr = atob(entry.data);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            let finalBytes = bytes;
            if (entry.compressed) {
              if (typeof DecompressionStream !== 'undefined') {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                const reader = ds.readable.getReader();
                writer.write(bytes);
                writer.close();
                const chunks = [];
                let totalLen = 0;
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  chunks.push(value);
                  totalLen += value.length;
                }
                finalBytes = new Uint8Array(totalLen);
                let offset = 0;
                for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
              } else {
                console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
              }
            }

            blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
          } catch (err) {
            console.error('Failed to decode asset ' + uuid + ':', err);
            blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
          }
        }));

        const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
        const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
        const resourceMap = {};
        for (const entry of extResources) {
          if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
        }

        setStatus('Rendering...');
        for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

        // Strip integrity + crossorigin — blob URLs from a file:// document inherit
        // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
        // The manifest bytes are ours; SRI protects against CDN compromise, not this.
        template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

        const resourceScript = '<script>window.__resources = ' +
          JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
          ';</' + 'script>';
        // Inject after <head> so the DOCTYPE stays first; prepending the script
        // would push the parser into quirks mode. DOMParser always emits a <head>
        // (synthesizing one if the source HTML omitted it) but may carry
        // attributes through, so match the full opening tag. slice() rather than
        // replace() keeps us clear of $-pattern substitution in resourceScript.
        const headOpen = template.match(/<head[^>]*>/i);
        if (headOpen) {
          const i = headOpen.index + headOpen[0].length;
          template = template.slice(0, i) + resourceScript + template.slice(i);
        }

        // Parse the template and swap the root element. Scripts inserted via
        // DOMParser/replaceWith are inert per spec — re-create each with
        // createElement so they execute, awaiting onload for src scripts to
        // preserve ordering (React before ReactDOM before Babel before text/babel).
        const doc = new DOMParser().parseFromString(template, 'text/html');
        document.documentElement.replaceWith(doc.documentElement);
        const dead = Array.from(document.scripts);
        for (const old of dead) {
          const s = document.createElement('script');
          for (const a of old.attributes) s.setAttribute(a.name, a.value);
          s.textContent = old.textContent;
          // text/babel scripts with a src: fetch and inline. transformScriptTags
          // does XHR against the src, but blob:null/ from a file:// origin is
          // silently dropped. Inlining makes it a plain inline babel script,
          // which transformScriptTags handles unconditionally.
          if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          }
          const p = s.src ? new Promise(function (r) { s.onload = s.onerror = r; }) : null;
          old.replaceWith(s);
          if (p) await p;
        }
        // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
        // which fired before we swapped the document. Trigger manually if present.
        if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
          window.Babel.transformScriptTags();
        }
      } catch (err) {
        setStatus('Error unpacking: ' + err.message);
        console.error('Bundle unpack error:', err);
      }
    });

  </script>

-radius:999px;padding:4px;}\n    .lang-switcher button{border:none;border-radius:999px;padding:6px 10px;font-family:inherit;font-size:11px;font-weight:800;cursor:pointer;transition:all .16s ease;}\n    .app-section{background:#FEFEFE;border:1px solid #dee2e6;border-radius:18px;padding:24px;margin-bottom:32px;box-shadow:0 14px 40px rgba(13,68,96,.06);position:relative;overflow:hidden;}\n    .app-section::before{content:\"\";position:absolute;inset:0 0 auto;height:4px;background:linear-gradient(90deg,#0D4460,#f5a302,#70ad47);}\n    .section-heading-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap;}\n    .section-heading-line{flex:1;height:1px;background:#dee2e6;min-width:80px;}\n    .section-title-text{font-family:'Open Sans','Noto Kufi Arabic',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;line-height:1.2;letter-spacing:3px;font-weight:800;text-transform:uppercase;color:#0D4460;}\n    .section-title-text.light{color:#FEFEFE;}\n    [data-pi-root][dir=\"rtl\"] .section-title-text{letter-spacing:0;}\n    .status-legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap;color:#5b5b5b;font-size:11px;font-weight:700;}\n    .status-legend span{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 9px;}\n    [data-pi-root][dir=\"rtl\"] .kpi-tooltip{text-align:right;}\n  <\/style>\n<\/helmet>\n\n<div data-pi-root=\"\" dir=\"{{ dir }}\" style=\"min-height:100vh;background:#F4F4F4;font-family:'Open Sans','Noto Kufi Arabic',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;direction:{{ dir }};\">\n\n  <!-- TOP ACCENT STRIPE -->\n  <div style=\"height:5px;background:linear-gradient(90deg,#0D4460 0%,#7393A2 28%,#f5a302 56%,#70ad47 100%);\"><\/div>\n\n  <!-- NAV -->\n  <nav style=\"background:rgba(254,254,254,.94);backdrop-filter:blur(14px);border-bottom:1px solid #dee2e6;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:60;box-shadow:0 2px 12px rgba(0,0,0,0.05);\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <div class=\"logo-tile\" style=\"width:34px;height:34px;border-radius:10px;\"><img src=\"logo_PPC.png\" alt=\"Two State Solution TS Brief logo\"><\/div>\n      <div>\n        <div style=\"font-size:15px;font-weight:700;color:#2B2A29;line-height:1.1;\">{{ t.title }}<\/div>\n        <div style=\"font-size:9px;color:#7393A2;letter-spacing:2px;line-height:1;\">{{ t.tagline }}<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"display:flex;align-items:center;gap:20px;\">\n      <a href=\"#key-matrix\" style=\"font-size:12px;color:#0D4460;font-weight:600;\" style-hover=\"color:#2B2A29;\">{{ t.nBar }}<\/a>\n      <a href=\"#signals\" style=\"font-size:12px;color:#0D4460;font-weight:600;\" style-hover=\"color:#2B2A29;\">{{ t.nSig }}<\/a>\n      <a href=\"#mediators\" style=\"font-size:12px;color:#0D4460;font-weight:600;\" style-hover=\"color:#2B2A29;\">{{ t.nMed }}<\/a>\n      <a href=\"#timeline\" style=\"font-size:12px;color:#0D4460;font-weight:600;\" style-hover=\"color:#2B2A29;\">{{ t.nTim }}<\/a>\n      <a href=\"#report-gen\" style=\"font-size:12px;color:#0D4460;font-weight:600;\" style-hover=\"color:#2B2A29;\">{{ t.nRep }}<\/a>\n      <div style=\"width:1px;height:20px;background:#dee2e6;\"><\/div>\n      <div class=\"lang-switcher\">\n        <sc-for list=\"{{ langOptions }}\" as=\"lo\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ lo.onSelect }}\" style=\"{{ lo.bs }}\">{{ lo.label }}<\/button>\n        <\/sc-for>\n      <\/div>\n      <div style=\"width:1px;height:20px;background:#dee2e6;\"><\/div>\n      <div style=\"display:flex;align-items:center;gap:6px;\">\n        <div style=\"width:7px;height:7px;border-radius:50%;background:#70ad47;animation:tick 2.5s ease infinite;\"><\/div>\n        <span style=\"font-size:11px;color:#70ad47;font-weight:600;\">{{ nowLabel }}<\/span>\n      <\/div>\n    <\/div>\n  <\/nav>\n\n  <!-- HERO -->\n  <head { k.sub }}<\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n  <\/div>\n\n  <main style=\"width:calc(100% - 80px);max-width:1100px;margin:0 auto;padding:42px 0 88px;\">\n\n    <!-- PEACE SIGNALS -->\n    <div id=\"signals\" class=\"app-section\">\n      <div class=\"section-heading-row\">\n        <span class=\"section-title-text\">{{ t.secSig }}<\/span>\n        <div class=\"section-heading-line\"><\/div>\n        <div class=\"status-legend\">\n          <sc-for list=\"{{ polarityLegend }}\" as=\"pl\" hint-placeholder-count=\"3\">\n            <span><i style=\"{{ pl.dotStyle }}\"><\/i>{{ pl.label }}<\/span>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;\">\n        <sc-for list=\"{{ signals }}\" as=\"sig\" hint-placeholder-count=\"8\">\n          <div style=\"{{ sig.cs }}\" style-hover=\"transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.08);\" onclick=\"{{ sig.onToggle }}\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;\">\n              <div style=\"display:flex;align-items:center;gap:8px;\">\n                <div style=\"{{ sig.ds }}\"><\/div>\n                <span style=\"{{ sig.ts }}\">{{ sig.type }}<\/span>\n              <\/div>\n              <span style=\"font-size:10px;color:#9D9D9D;flex-shrink:0;\">{{ sig.time }}<\/span>\n            <\/div>\n            <p style=\"font-size:13px;color:#2B2A29;font-weight:600;line-height:1.55;margin:0 0 6px;text-wrap:pretty;\">{{ sig.title }}<\/p>\n            <div style=\"font-size:11px;color:#7393A2;margin-bottom:8px;\">{{ sig.source }}<\/div>\n            <sc-if value=\"{{ sig.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#F0ECE4;border-radius:8px;padding:10px 12px;margin-top:4px;animation:fadeUp 0.2s ease;\">\n                <p style=\"font-size:12px;color:#5b5b5b;line-height: gn-items:center;gap:10px;margin-bottom:10px;\">\n                    <div style=\"{{ med.as }}\">{{ med.abbr }}<\/div>\n                    <div>\n                      <div style=\"font-size:13px;font-weight:700;color:#2B2A29;\">{{ med.name }}<\/div>\n                      <div style=\"font-size:10px;color:#7393A2;\">{{ med.role }}<\/div>\n                    <\/div>\n                  <\/div>\n                  <div style=\"font-size:11px;color:#5b5b5b;line-height:1.55;margin-bottom:8px;\">{{ med.activity }}<\/div>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                    <span style=\"{{ med.ss }}\">{{ med.status }}<\/span>\n                    <span style=\"font-size:10px;color:#9D9D9D;\">{{ med.last }}<\/span>\n                  <\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n\n      <!-- Engagement matrix mini -->\n      <div style=\"background:#FEFEFE;border:1px solid #dee2e6;border-radius:12px;padding:20px 24px;\">\n        <div style=\"font-size:10px;letter-spacing:3px;color:#7393A2;font-weight:700;margin-bottom:14px;\">{{ t.currentDiplomatic }}<\/div>\n        <div style=\"border:1px solid #e7e7e7;border-radius:12px;overflow:hidden;background:#FEFEFE;\">\n          <sc-for list=\"{{ engagements }}\" as=\"eng\" hint-placeholder-count=\"4\">\n            <div style=\"{{ eng.rowStyle }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;width:270px;min-width:230px;\">\n                <span style=\"{{ eng.dotStyle }}\"><\/span>\n                <div style=\"min-width:0;\">\n                  <div style=\"font-size:12px;color:#2B2A29;font-weight:800;line-height:1.35;text-wrap:pretty;\">{{ eng.party }}<\/div>\n                  <div style=\"font-size:10px;color:#7393A2;line-height:1.45;text-wrap:pretty;\">{{ eng.note }}<\/div>\n                <\/div>\n              <\/div>\n              <div s 00;color:#0D4460;letter-spacing:1.5px;text-transform:uppercase;\">{{ t.timelineCurrent }}<\/div>\n        <div style=\"flex:1;min-width:190px;height:8px;background:#e7e7e7;border-radius:999px;overflow:hidden;\">\n          <div style=\"height:100%;width:35%;background:linear-gradient(90deg,#70ad47,#f5a302);border-radius:999px;\"><\/div>\n        <\/div>\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <span style=\"font-size:10px;font-weight:800;color:#70ad47;\">{{ t.reachedRange }}<\/span>\n          <span style=\"font-size:10px;font-weight:800;color:#f5a302;\">{{ t.underwayRange }}<\/span>\n          <span style=\"font-size:12px;font-weight:900;color:#e27821;direction:ltr;\">7 / 20<\/span>\n        <\/div>\n      <\/div>\n      <div style=\"position:relative;padding-left:20px;\">\n        <div style=\"position:absolute;left:6px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#70ad47,#dee2e6);border-radius:1px;\"><\/div>\n        <div style=\"display:flex;flex-direction:column;gap:0;\">\n          <sc-for list=\"{{ timeline }}\" as=\"ev\" hint-placeholder-count=\"20\">\n            <div style=\"display:flex;align-items:flex-start;gap:16px;padding-bottom:20px;position:relative;\">\n              <div style=\"{{ ev.dotStyle }}\"><\/div>\n              <div style=\"{{ ev.cs }}\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;\">\n                  <span style=\"font-size:10px;color:#9D9D9D;direction:ltr;flex-shrink:0;\">{{ ev.date }}<\/span>\n                  <span style=\"{{ ev.ts }}\">{{ ev.type }}<\/span>\n                  <sc-if value=\"{{ ev.milestone }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size:9px;background:#FAE8B8;color:#e27821;border:1px solid #E0C888;border-radius:4px;padding:1px 6px;font-weight:700;\">Milestone<\/span>\n                  <\/sc-if>\n                <\/div>\n                <p style=\"font-size:13px; spacing:3px;font-weight:700;margin-bottom:4px;\">Trend Analysis<\/div>\n              <div style=\"font-size:16px;font-weight:700;color:#2B2A29;\">Peace index over time — 18 months<\/div>\n              <div style=\"font-size:12px;color:#7393A2;margin-top:3px;\">January 2025 — June 2026<\/div>\n            <\/div>\n            <div style=\"display:flex;gap:14px;flex-wrap:wrap;align-items:center;\">\n              <div style=\"display:flex;align-items:center;gap:6px;\"><div style=\"width:18px;height:3px;background:#70ad47;border-radius:2px;\"><\/div><span style=\"font-size:11px;color:#5b5b5b;\">Peace index<\/span><\/div>\n              <div style=\"display:flex;align-items:center;gap:6px;\"><div style=\"width:18px;height:3px;background:#0D4460;border-radius:2px;border-bottom:2px dashed #0D4460;\"><\/div><span style=\"font-size:11px;color:#5b5b5b;\">Diplomatic activity<\/span><\/div>\n              <div style=\"display:flex;align-items:center;gap:6px;\"><div style=\"width:18px;height:3px;background:#d9534f;border-radius:2px;\"><\/div><span style=\"font-size:11px;color:#5b5b5b;\">Military escalation<\/span><\/div>\n            <\/div>\n          <\/div>\n          <div style=\"background:#F4F4F4;border-radius:10px;padding:16px 12px 8px;margin-bottom:16px;position:relative;overflow:hidden;\">\n            <svg width=\"100%\" height=\"140\" viewBox=\"0 0 720 140\" preserveAspectRatio=\"none\" style=\"display:block;overflow:visible;\">\n              <defs>\n                <linearGradient id=\"peaceGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                  <stop offset=\"0%\" stop-color=\"#70ad47\" stop-opacity=\"0.18\"><\/stop>\n                  <stop offset=\"100%\" stop-color=\"#70ad47\" stop-opacity=\"0\"><\/stop>\n                <\/linearGradient>\n              <\/defs>\n              <!-- Grid lines -->\n              <line x1=\"0\" y1=\"35\" x2=\"720\" y2=\"35\" stroke=\"#dee2e6\" stroke-width=\"1\" stroke-dasharray=\"4 3\"><\/line>\n              <line x1= ght:1.6;margin:0;\">{{ an.explanation }}<\/p>\n                    <\/div>\n                  <\/div>\n                  <div style=\"text-align:left;flex-shrink:0;\">\n                    <div style=\"font-size:10px;color:#9D9D9D;margin-bottom:2px;\">Deviation<\/div>\n                    <div style=\"font-size:18px;font-weight:700;color:{{ an.devColor }};direction:ltr;\">{{ an.deviation }}<\/div>\n                  <\/div>\n                <\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ── TAB 3: FORECASTING ── -->\n      <sc-if value=\"{{ isTabForecast }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#FEFEFE;border:1px solid #dee2e6;border-radius:14px;padding:24px;animation:fadeUp 0.3s ease;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px;\">\n            <div>\n              <div style=\"font-size:11px;color:#0D4460;letter-spacing:3px;font-weight:700;margin-bottom:4px;\">Forecasting<\/div>\n              <div style=\"font-size:16px;font-weight:700;color:#2B2A29;\">Scenarios for the next 90 days<\/div>\n              <div style=\"font-size:12px;color:#7393A2;margin-top:3px;\">Based on 24 diplomatic, field, and humanitarian variables<\/div>\n            <\/div>\n            <div style=\"background:#F4F4F4;border:1px solid #dee2e6;border-radius:8px;padding:10px 16px;text-align:center;\">\n              <div style=\"font-size:10px;color:#7393A2;margin-bottom:2px;\">Model accuracy<\/div>\n              <div style=\"font-size:20px;font-weight:700;color:#70ad47;\">74%<\/div>\n              <div style=\"font-size:9px;color:#7393A2;\">Last 12 predictions<\/div>\n            <\/div>\n          <\/div>\n          <!-- Scenarios -->\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:22px;\">\n            <sc-for list=\"{{ scenarios }}\" as=\"sc2\" hint-placeholder-count=\"4\">\n              <div style=\"{{ sc2.cs }}\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n                  <div style=\"font-size:14px;font-weight:700;color:#2B2A29;\">{{ sc2.title }}<\/div>\n                  <div style=\"{{ sc2.probStyle }}\">{{ sc2.prob }}%<\/div>\n                <\/div>\n                <div style=\"height:8px;background:#e7e7e7;border-radius:4px;overflow:hidden;margin-bottom:10px;\">\n                  <div style=\"{{ sc2.barStyle }}\"><\/div>\n                <\/div>\n                <p style=\"font-size:12px;color:#5b5b5b;line-height:1.65;margin:0 0 10px;text-wrap:pretty;\">{{ sc2.desc }}<\/p>\n                <div style=\"display:flex;flex-wrap:wrap;gap:5px;\">\n                  <sc-for list=\"{{ sc2.drivers }}\" as=\"d\" hint-placeholder-count=\"3\">\n                    <span style=\"font-size:10px;color:#5b5b5b;background:#e7e7e7;border-radius:4px;padding:2px 7px;\">{{ d }}<\/span>\n                  <\/sc-for>\n                <\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n          <!-- Forecast timeline mini -->\n          <div style=\"background:#F4F4F4;border-radius:10px;padding:16px 20px;\">\n            <div style=\"font-size:10px;color:#7393A2;letter-spacing:2px;font-weight:700;margin-bottom:12px;\">Forecast window — weekly ceasefire durability probability<\/div>\n            <div style=\"display:flex;align-items:flex-end;gap:6px;height:60px;\">\n              <sc-for list=\"{{ forecastBars }}\" as=\"fb\" hint-placeholder-count=\"12\">\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;\">\n                  <div style=\"{{ fb.bs }}\"><\/div>\n                  <div style=\"font-size:8px;color:#9D9D9D;text-align:center;white-space:nowrap;\">{{ fb.week }}<\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ── TAB 4: PREDICTION ENGINE ── -->\n      <sc-if value=\"{{ isTabPredict }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#FEFEFE;border:1px solid #dee2e6;border-radius:14px;overflow:hidden;animation:fadeUp 0.3s ease;\">\n          <div style=\"background:linear-gradient(135deg,#F4F4F4,#f8f7f7);padding:20px 24px;border-bottom:1px solid #D8D4CC;\">\n            <div style=\"font-size:11px;color:#70ad47;letter-spacing:3px;font-weight:700;margin-bottom:4px;\">Prediction Engine<\/div>\n            <div style=\"font-size:16px;font-weight:700;color:#2B2A29;\">Interactive prediction models<\/div>\n            <div style=\"font-size:12px;color:#7393A2;margin-top:3px;\">Adjust variables and see how they affect peace probability<\/div>\n          <\/div>\n          <div style=\"padding:24px;\">\n            <!-- Sliders / variable inputs -->\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px;\">\n              <sc-for list=\"{{ predictVars }}\" as=\"pv\" hint-placeholder-count=\"4\">\n                <div style=\"background:#F4F4F4;border-radius:10px;padding:14px 16px;\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n                    <span style=\"font-size:12px;font-weight:700;color:#2B2A29;\">{{ pv.label }}<\/span>\n                    <div style=\"display:flex;align-items:center;gap:6px;\">\n                      <button onclick=\"{{ pv.onDec }}\" style=\"width:22px;height:22px;border-radius:50%;border:1px solid #dee2e6;background:#FEFEFE;color:#5b5b5b;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;\">−<\/button>\n                      <span style=\"font-size:15px;font-weight:700;color:#2B2A29;width:36px;text-align:center;font-variant-numeric:tabular-nums;direction:ltr;\">{{ pv.display }}<\/span>\n                      <button onclick=\"{{ pv.onInc }}\" style=\"width:22px;height:22px;border-radius:50%;border:1px solid #dee2e6;background:#FEFEFE;color:#5b5b5b;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;\">+<\/button>\n                    <\/div>\n                  <\/div>\n                  <div style=\"height:6px;background:#dee2e6;border-radius:3px;overflow:hidden;\">\n                    <div style=\"{{ pv.barStyle }}\"><\/div>\n                  <\/div>\n                  <div style=\"font-size:10px;color:#7393A2;margin-top:5px;\">{{ pv.desc }}<\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n            <!-- Prediction result -->\n            <div style=\"{{ predResultStyle }}\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px;\">\n                <div style=\"width:56px;height:56px;border-radius:50%;border:3px solid {{ predColor }};display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                  <span style=\"font-size:20px;font-weight:700;color:{{ predColor }};direction:ltr;font-variant-numeric:tabular-nums;\">{{ predProb }}%<\/span>\n                <\/div>\n                <div>\n                  <div style=\"font-size:14px;font-weight:700;color:#2B2A29;margin-bottom:2px;\">Ceasefire durability probability — 30 days<\/div>\n                  <div style=\"font-size:12px;color:#7393A2;\">Based on current variables<\/div>\n                <\/div>\n                <div style=\"margin-left:auto;background:{{ predColor }}18;border:1px solid {{ predColor }}44;border-radius:8px;padding:6px 12px;\">\n                  <div style=\"font-size:11px;font-weight:700;color:{{ predColor }};\">{{ predLabel }}<\/div>\n                <\/div>\n              <\/div>\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;\">\n                <sc-for list=\"{{ predBreakdown }}\" as=\"pb\" hint-placeholder-count=\"4\">\n                  <div style=\"background:#F4F4F4;border-radius:8px;padding:10px 12px;\">\n                    <div style=\"font-size:10px;color:#7393A2;margin-bottom:3px;\">{{ pb.label }}<\/div>\n                    <div style=\"font-size:15px;font-weight:700;color:#2B2A29;\">{{ pb.value }}<\/div>\n                  <\/div>\n                <\/sc-for>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n    <\/div>\n\n    <!-- ══════════════════════════════════════════════ -->\n    <!-- AI REPORT GENERATOR                            -->\n    <!-- ══════════════════════════════════════════════ -->\n    <div id=\"report-gen\" class=\"app-section\" style=\"padding:0;overflow:hidden;\">\n      <div style=\"background:linear-gradient(135deg,#0D4460,#f5a302);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <div class=\"section-emblem report\" style=\"box-shadow:none;\"><span class=\"node\"><\/span><\/div>\n          <div>\n            <div class=\"section-title-text light\">{{ t.secRep }}<\/div>\n            <div style=\"font-size:10px;color:rgba(253,250,246,0.75);letter-spacing:2px;\">{{ t.repSub }}<\/div>\n          <\/div>\n        <\/div>\n        <div style=\"display:flex;align-items:center;gap:6px;background:#EFF1E3;border-radius:20px;border:1px solid rgba(112,173,71,0.24);padding:5px 14px;\">\n          <div style=\"width:6px;height:6px;border-radius:50%;background:#70ad47;animation:breathe 2s ease infinite;\"><\/div>\n          <span style=\"font-size:10px;color:#0D4460;font-weight:700;\">{{ t.readyGenerate }}<\/span>\n        <\/div>\n      <\/div>\n\n      <div style=\"padding:24px 28px;\">\n        <!-- STE  1: PERIOD -->\n        <div style=\"margin-bottom:20px;\">\n          <div style=\"font-size:11px;color:#70ad4
